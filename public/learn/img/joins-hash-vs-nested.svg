<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Hash join compared with nested loop join</title>
  <desc id="desc">Hash join builds an in-memory lookup, while nested loop compares every pair.</desc>
  <style>.bg{fill:hsl(0 0% 100%)}.card{fill:hsl(210 40% 98%);stroke:hsl(214 32% 91%);stroke-width:2}.head{fill:hsl(221 83% 53%)}.accent{fill:hsl(173 80% 36%)}.warn{fill:hsl(38 92% 50%)}.text{fill:hsl(222 47% 11%);font:700 22px ui-sans-serif,system-ui}.small{fill:hsl(215 16% 47%);font:500 16px ui-sans-serif,system-ui}.mono{fill:hsl(222 47% 11%);font:600 16px ui-monospace,SFMono-Regular,Menlo,monospace}.line{stroke:hsl(221 83% 53%);stroke-width:4;fill:none;stroke-linecap:round}.thin{stroke:hsl(215 16% 65%);stroke-width:2;fill:none}.node{fill:hsl(0 0% 100%);stroke:hsl(214 32% 85%);stroke-width:2}@media (prefers-color-scheme: dark){.bg{fill:hsl(222 47% 7%)}.card{fill:hsl(222 47% 11%);stroke:hsl(217 33% 22%)}.node{fill:hsl(222 47% 8%);stroke:hsl(217 33% 28%)}.text,.mono{fill:hsl(210 40% 98%)}.small{fill:hsl(215 20% 65%)}}</style>
  <rect class="bg" width="960" height="420" rx="24"/>
  <rect class="card" x="54" y="58" width="400" height="300" rx="20"/>
  <text class="text" x="88" y="102">Hash join</text>
  <text class="small" x="88" y="132">Build lookup once, then probe.</text>
  <rect class="node" x="88" y="170" width="120" height="48" rx="12"/><text class="mono" x="118" y="201">id:1</text>
  <rect class="node" x="88" y="238" width="120" height="48" rx="12"/><text class="mono" x="118" y="269">id:2</text>
  <path class="line" d="M232 194 H380"/><path class="line" d="M232 262 H380"/>
  <text class="mono" x="292" y="180">hash map</text>
  <text class="small" x="88" y="326">Often O(n + m), needs memory.</text>
  <rect class="card" x="506" y="58" width="400" height="300" rx="20"/>
  <text class="text" x="540" y="102">Nested loop</text>
  <text class="small" x="540" y="132">Try each left row against each right row.</text>
  <circle class="node" cx="582" cy="194" r="24"/><text class="mono" x="574" y="200">A</text>
  <circle class="node" cx="582" cy="262" r="24"/><text class="mono" x="574" y="268">B</text>
  <circle class="node" cx="760" cy="174" r="24"/><text class="mono" x="752" y="180">1</text>
  <circle class="node" cx="760" cy="230" r="24"/><text class="mono" x="752" y="236">2</text>
  <circle class="node" cx="760" cy="286" r="24"/><text class="mono" x="752" y="292">3</text>
  <path class="thin" d="M606 194 L736 174 M606 194 L736 230 M606 194 L736 286 M606 262 L736 174 M606 262 L736 230 M606 262 L736 286"/>
  <text class="small" x="540" y="326">Can be O(n x m), low setup cost.</text>
</svg>
