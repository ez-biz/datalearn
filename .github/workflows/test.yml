name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Default to read-only token permissions (CodeQL: actions/missing-workflow-permissions).
# Individual jobs can re-grant if they ever need to write.
permissions:
  contents: read

# Cancel in-flight runs on force-push to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datalearn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Test DB
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/datalearn
      # Auth.js requires these to be present (test bypasses OAuth via DB
      # session inserts in tests/e2e/fixtures/db.ts).
      AUTH_SECRET: ci-test-secret-${{ github.run_id }}-do-not-reuse
      AUTH_TRUST_HOST: "true"
      AUTH_GITHUB_ID: ci-dummy
      AUTH_GITHUB_SECRET: ci-dummy
      AUTH_GOOGLE_ID: ci-dummy
      AUTH_GOOGLE_SECRET: ci-dummy
      # API key hashing secret (HMAC-SHA-256 in lib/api-auth.ts). Run-scoped
      # so each CI run gets a fresh value; tests don't share keys across runs.
      API_KEY_HASH_SECRET: ci-test-key-secret-${{ github.run_id }}-do-not-reuse

    steps:
      - uses: actions/checkout@v7

      - name: Palette guard
        run: ./scripts/check-no-palette-colors.sh

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed
        run: npx tsx prisma/seed.ts

      - name: Seed visual lesson
        run: npm run seed:visual

      - name: Audit SQL dialect outputs
        run: npm run audit:dialects:ci

      - name: Test SQL read-only guard
        run: npm run test:sql-restrict

      - name: Test SQL engine telemetry
        run: npm run test:sql-engine-telemetry

      - name: Test DuckDB browser init fallback
        run: npm run test:duckdb-init

      - name: Test SQL engine warmup registry
        run: npm run test:sql-engine-warmup

      - name: Test solution resolver
        run: npm run test:solutions

      - name: Test PGlite schema cache key
        run: npm run test:schema-cache-key

      - name: Test tag-discovery actions
        run: npm run test:tag-discovery

      - name: Test companies tagging actions
        run: npm run test:companies-tagging

      - name: Test tracks actions
        run: npm run test:tracks

      - name: Test article publish validation
        run: npm run test:article-publish-validation

      - name: Check MCP bundle isolation
        run: npm run check:mcp-bundle-isolation

      - name: Test MCP e2e log redaction
        run: npm run test:mcp-e2e-log-redaction

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test article publish routes
        run: |
          npm run start -- -p 3101 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          for i in {1..30}; do
            if curl -fsS http://localhost:3101/api/health >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://localhost:3101/api/health >/dev/null
          TEST_BASE_URL=http://localhost:3101 npm run test:article-publish-routes

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
