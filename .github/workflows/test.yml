name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Default to read-only token permissions (CodeQL: actions/missing-workflow-permissions).
# Individual jobs can re-grant if they ever need to write.
permissions:
  contents: read

# Cancel in-flight runs on force-push to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datalearn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Test DB
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/datalearn
      # Auth.js requires these to be present (test bypasses OAuth via DB
      # session inserts in tests/e2e/fixtures/db.ts).
      AUTH_SECRET: ci-test-secret-${{ github.run_id }}-do-not-reuse
      AUTH_TRUST_HOST: "true"
      AUTH_GITHUB_ID: ci-dummy
      AUTH_GITHUB_SECRET: ci-dummy
      AUTH_GOOGLE_ID: ci-dummy
      AUTH_GOOGLE_SECRET: ci-dummy
      # API key hashing secret (HMAC-SHA-256 in lib/api-auth.ts). Run-scoped
      # so each CI run gets a fresh value; tests don't share keys across runs.
      API_KEY_HASH_SECRET: ci-test-key-secret-${{ github.run_id }}-do-not-reuse

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed
        run: npx tsx prisma/seed.ts

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
